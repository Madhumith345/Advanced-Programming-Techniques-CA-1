name: Multi-Language Test Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  dotnet-tests:
    name: Build & Test (.NET)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Restore dependencies
        run: |
          dotnet restore Que1/ChurrosTests/ChurrosTests.csproj
          dotnet restore Que2/Que2.csproj

      - name: Build
        run: |
          dotnet build Que1/ChurrosTests/ChurrosTests.csproj --configuration Release --no-restore
          dotnet build Que2/Que2.csproj --configuration Release --no-restore

      - name: Run Tests
        run: dotnet test Que1/ChurrosTests/ChurrosTests.csproj --configuration Release --no-build --verbosity normal

  python-tests:
    name: Lint & Smoke Test (Python)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Web Scraper (Smoke Test)
        run: python Que4/Que4.py

      - name: Run Client/Server Check (Optional)
        run: |
          # Just a syntax check for now as servers are long-running
          python -m py_compile Que3/Que3_server.py Que3/Que3_client.py
